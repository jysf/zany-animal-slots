# guidance/constraints.yaml
# Repo-level rules that all agents (and humans) working in this repo
# must follow. Maps to ContextCore agentGuidance.constraints.
#
# Every constraint MUST have:
#   - id: stable kebab-case identifier
#   - rule: one sentence
#   - severity: blocking | warning | advisory
#   - paths: glob list (use ["**"] for repo-wide)
#   - added_by: human | claude | <agent-id>
#   - added_at: YYYY-MM-DD
#   - rationale: why (link to DEC-XXX preferred)
#
# Severity note: the project plan rated the project constraints below as
# critical / high / medium. Mapped to this file's enum as: critical and the
# mechanically-enforceable high rules -> blocking; quality/UX high & medium
# rules -> warning; the measured perf target -> advisory.

constraints:
  - id: no-secrets-in-code
    rule: "Never commit API keys, tokens, passwords, or credentials. Use environment variables referenced via .env.example."
    severity: blocking
    paths: ["**"]
    added_by: human
    added_at: 2026-04-19
    rationale: "Baseline security hygiene."

  - id: test-before-implementation
    rule: "Failing tests are written as part of the spec during design. Implementation makes those tests pass. Do not skip this order."
    severity: blocking
    paths: ["**"]
    added_by: human
    added_at: 2026-04-19
    rationale: "TDD discipline; provides automatic verification of acceptance criteria."

  - id: no-new-top-level-deps-without-decision
    rule: "Do not add a new top-level dependency (package.json, pyproject.toml, etc.) without first emitting a DEC-XXX file justifying the choice."
    severity: warning
    paths: ["package.json", "pyproject.toml", "Cargo.toml", "go.mod"]
    added_by: claude
    added_at: 2026-04-19
    rationale: "Dependencies are forever. Force deliberation. (Tone.js is justified by DEC-007.)"

  - id: one-spec-per-pr
    rule: "Each PR must reference exactly one SPEC-XXX in its description. Bundled changes are rejected."
    severity: blocking
    paths: ["**"]
    added_by: human
    added_at: 2026-04-19
    rationale: "Keeps review loop tractable and traceable."

  - id: cost-captured-per-cycle
    rule: "Every shipped spec must record a real `tokens_total` on its metered cycles (build, verify) in `cost.sessions` — the orchestrator fills it from the Agent result's subagent_tokens (or `/cost`) at ship. Only un-metered main-loop cycles (design, ship) may be null-with-note. Enforced by `just cost-audit` (CI job `cost-data`)."
    severity: warning
    paths: ["projects/**/specs/**"]
    added_by: claude
    added_at: 2026-06-17
    rationale: "Cost tracking is structurally present but silently goes empty when documentation alone asks for it (all-null numerics). A check makes it stick — the same pattern as wiring a license policy into CI. See AGENTS.md §4 and docs/cost-tracking.md."

  - id: license-policy
    rule: "If this project pulls in third-party dependencies, define an allowed-license policy (typically permissive-only: MIT / Apache-2.0 / BSD / ISC / Zlib) and enforce it in CI with your ecosystem's tool — cargo-deny (Rust), pip-licenses / pip-audit (Python), license-checker (Node), go-licenses (Go). Any dependency outside the policy fails the build unless explicitly excepted."
    severity: blocking
    paths: ["**"]
    added_by: claude
    added_at: 2026-06-17
    rationale: "A copyleft (GPL/AGPL) dependency can silently relicense a statically-linked binary, and license drift is invisible until an audit. Make the policy mechanical. The tool is per-language — see docs/license-policy.md (includes a Rust cargo-deny worked example). Bumped advisory→blocking 2026-07-03 now that it is actually CI-enforced for this repo: the `supply-chain` job (SPEC-036) runs `scripts/license-check.mjs` + `npm audit --omit=dev --audit-level=high` and fails the build on a violation."

  # --- PROJ-001 Animal Slots constraints ---

  - id: no-real-money
    rule: "Play-money only: no wagering of real currency, no IAP, and no payment integration, ever. If any task seems to imply real money, stop and flag."
    severity: blocking
    paths: ["**"]
    added_by: claude
    added_at: 2026-06-18
    rationale: "Real money turns a slot into a regulated gambling product. Keep the model strictly play-money to avoid the entire regulatory/payment surface. See DEC-005."

  - id: engine-no-dom
    rule: "`src/engine/**` must not import React or touch the DOM; the UI consumes the engine only through its typed interface (`src/engine/index.ts`). Enforce via ESLint no-restricted-imports / import boundary."
    severity: blocking
    paths: ["src/engine/**"]
    added_by: claude
    added_at: 2026-06-18
    rationale: "The engine/presentation separation is the project's central thesis and what makes the engine unit-testable without a browser. Make the wall mechanical. See DEC-001."

  - id: deterministic-rng
    rule: "All engine randomness goes through the injected seedable PRNG; no bare `Math.random()` in `src/engine/**`."
    severity: blocking
    paths: ["src/engine/**"]
    added_by: claude
    added_at: 2026-06-18
    rationale: "Deterministic, reproducible spins are what make the engine testable (a pinned seed asserts a known grid/payout). See DEC-002."

  - id: portrait-first
    rule: "Primary layout is portrait and must render correctly 375–430px wide; desktop shows the cabinet centered in a device frame."
    severity: warning
    paths: ["src/ui/**", "src/styles/**"]
    added_by: claude
    added_at: 2026-06-18
    rationale: "Mobile-first is the product's core form factor; desktop is a framed secondary. Verified by review, not a CI gate. See STAGE-001."

  - id: respect-reduced-motion
    rule: "Honor `prefers-reduced-motion`: any animated spin/celebration must have a non-animated win-feedback path."
    severity: warning
    paths: ["src/ui/**"]
    added_by: claude
    added_at: 2026-06-18
    rationale: "An animation-heavy game must remain usable (and not nauseating) for users who opt out of motion. Keep the reduced-motion path open from the first animation rather than retrofitting it. See DEC-004; formalized in STAGE-005."

  - id: touch-targets-44
    rule: "All interactive controls have a hit area of at least 44px."
    severity: warning
    paths: ["src/ui/**"]
    added_by: claude
    added_at: 2026-06-18
    rationale: "Mobile usability / accessibility baseline for touch. Build compliant targets from the empty shell on. Audited in STAGE-005."

  - id: audio-gesture-and-mute
    rule: "No audio before a user gesture (browser autoplay policy); a global mute toggle is always available and its state persists."
    severity: warning
    paths: ["src/ui/audio/**"]
    added_by: claude
    added_at: 2026-06-18
    rationale: "Browsers block autoplay audio, and a play-money game must never trap the user in sound. Gesture-unlock + persisted mute by construction. See DEC-007."

  - id: perf-60fps
    rule: "Spin and celebration target 60fps on a mid-tier phone; no long main-thread blocks."
    severity: advisory
    paths: ["src/ui/**"]
    added_by: claude
    added_at: 2026-06-18
    rationale: "Smoothness is a stated success signal. This is a measured target (revisit DEC-004's CSS-animation choice if it fails), not a mechanical gate. Perf pass in STAGE-005."
