<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Zany Animal Slots">
  <!-- Self-contained slot-machine favicon (SPEC-064). No external refs; warm campfire palette.
       Transparent background so it reads on light or dark browser tab bars. -->
  <!-- base / feet -->
  <rect x="7" y="26.4" width="18" height="3.6" rx="1.6" fill="#8a5a24"/>
  <!-- cabinet body -->
  <rect x="6.5" y="3" width="19" height="24" rx="4.2" fill="#eaa63a"/>
  <!-- top marquee band -->
  <rect x="9" y="5.4" width="14" height="3" rx="1.5" fill="#c33a2b"/>
  <!-- reel window -->
  <rect x="9" y="10.3" width="14" height="9" rx="1.7" fill="#1b2430"/>
  <!-- three cream reel columns -->
  <rect x="9.9" y="11.3" width="3.8" height="7" rx="0.9" fill="#f5ecd6"/>
  <rect x="14.1" y="11.3" width="3.8" height="7" rx="0.9" fill="#f5ecd6"/>
  <rect x="18.3" y="11.3" width="3.8" height="7" rx="0.9" fill="#f5ecd6"/>
  <!-- a matching jackpot line of symbols -->
  <circle cx="11.8" cy="14.8" r="1.5" fill="#c33a2b"/>
  <circle cx="16" cy="14.8" r="1.5" fill="#c33a2b"/>
  <circle cx="20.2" cy="14.8" r="1.5" fill="#c33a2b"/>
  <!-- spin button -->
  <circle cx="16" cy="22.9" r="2.2" fill="#c33a2b"/>
  <circle cx="16" cy="22.9" r="0.95" fill="#f5ecd6"/>
  <!-- pull lever -->
  <rect x="24.7" y="11.5" width="1.7" height="7.5" rx="0.85" fill="#8a5a24"/>
  <circle cx="25.55" cy="10.6" r="2.15" fill="#c33a2b"/>
</svg>
