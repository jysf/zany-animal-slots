# guidance/constraints.yaml
# Repo-level rules that all agents (and humans) working in this repo
# must follow. Maps to ContextCore agentGuidance.constraints.
#
# Every constraint MUST have:
#   - id: stable kebab-case identifier
#   - rule: one sentence
#   - severity: blocking | warning | advisory
#   - paths: glob list (use ["**"] for repo-wide)
#   - added_by: human | claude | <agent-id>
#   - added_at: YYYY-MM-DD
#   - rationale: why (link to DEC-XXX preferred)

constraints:
  - id: no-secrets-in-code
    rule: "Never commit API keys, tokens, passwords, or credentials. Use environment variables referenced via .env.example."
    severity: blocking
    paths: ["**"]
    added_by: human
    added_at: 2026-04-19
    rationale: "Baseline security hygiene."

  - id: use-project-logger
    rule: "Use the project logger in src/lib/log.ts. Do not use console.log, console.error, or introduce new logging libraries."
    severity: blocking
    paths: ["src/**"]
    added_by: claude
    added_at: 2026-04-19
    rationale: "Consistency and structured logging. See DEC-001."

  - id: no-auth-changes-without-approval
    rule: "Do not modify authentication or authorization logic without human approval. If a spec requires auth changes, stop and request review."
    severity: blocking
    paths: ["src/auth/**", "src/middleware/auth*"]
    added_by: human
    added_at: 2026-04-19
    rationale: "Auth touches security and compliance; changes need human eyes."

  - id: test-before-implementation
    rule: "Failing tests are written as part of the spec during design. Implementation makes those tests pass. Do not skip this order."
    severity: blocking
    paths: ["**"]
    added_by: human
    added_at: 2026-04-19
    rationale: "TDD discipline; provides automatic verification of acceptance criteria."

  - id: no-new-top-level-deps-without-decision
    rule: "Do not add a new top-level dependency (package.json, pyproject.toml, etc.) without first emitting a DEC-XXX file justifying the choice."
    severity: warning
    paths: ["package.json", "pyproject.toml", "Cargo.toml", "go.mod"]
    added_by: claude
    added_at: 2026-04-19
    rationale: "Dependencies are forever. Force deliberation."

  - id: one-spec-per-pr
    rule: "Each PR must reference exactly one SPEC-XXX in its description. Bundled changes are rejected."
    severity: blocking
    paths: ["**"]
    added_by: human
    added_at: 2026-04-19
    rationale: "Keeps review loop tractable and traceable."

  - id: cost-captured-per-cycle
    rule: "Every shipped spec must record a real `tokens_total` on its metered cycles (build, verify) in `cost.sessions` — the orchestrator fills it from the Agent result's subagent_tokens (or `/cost`) at ship. Only un-metered main-loop cycles (design, ship) may be null-with-note. Enforced by `just cost-audit` (CI job `cost-data`)."
    severity: warning
    paths: ["projects/**/specs/**"]
    added_by: claude
    added_at: 2026-06-17
    rationale: "Cost tracking is structurally present but silently goes empty when documentation alone asks for it (all-null numerics). A check makes it stick — the same pattern as wiring a license policy into CI. See AGENTS.md §4 and docs/cost-tracking.md."

  - id: license-policy
    rule: "If this project pulls in third-party dependencies, define an allowed-license policy (typically permissive-only: MIT / Apache-2.0 / BSD / ISC / Zlib) and enforce it in CI with your ecosystem's tool — cargo-deny (Rust), pip-licenses / pip-audit (Python), license-checker (Node), go-licenses (Go). Any dependency outside the policy fails the build unless explicitly excepted."
    severity: advisory
    paths: ["**"]
    added_by: claude
    added_at: 2026-06-17
    rationale: "A copyleft (GPL/AGPL) dependency can silently relicense a statically-linked binary, and license drift is invisible until an audit. Make the policy mechanical. The tool is per-language — see docs/license-policy.md (includes a Rust cargo-deny worked example)."
