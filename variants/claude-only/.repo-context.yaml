# .repo-context.yaml
# Describes the APP (the repo itself). Persists across all projects run
# against this app. Forward-compatible with ContextCore's ProjectContext CRD.
#
# Projects (waves of work against this app) live in ./projects/<id>/ and
# each has its own brief.md.

apiVersion: contextcore.io/v2
kind: RepoContext

metadata:
  repo:
    id: my-app                        # REPLACE: short kebab-case identifier for the app
    name: "My App"                    # REPLACE: human-readable name
    purpose: "[REPLACE: one sentence describing what the app does]"
    url: "github.com/YOUR-ORG/YOUR-REPO"  # REPLACE

  business:
    criticality: medium               # critical | high | medium | low
    owner: my-team                    # REPLACE
    contacts:
      - "[REPLACE: email or slack channel]"

spec:
  stack:
    language: "[REPLACE: e.g., typescript]"
    runtime: "[REPLACE: e.g., node-20]"
    framework: "[REPLACE: e.g., next.js-14]"
    database: "[REPLACE: e.g., postgres-16]"
    hosting: "[REPLACE: e.g., vercel]"

  # Standard paths; do not change without also updating AGENTS.md.
  paths:
    agents_md: ./AGENTS.md
    docs: ./docs
    guidance: ./guidance
    decisions: ./decisions
    projects: ./projects
    templates: ./projects/_templates

  observability:
    sampling: null                    # Used if you adopt ContextCore.
    alert_routing: null               # REPLACE: e.g., "#my-team-oncall"
    runbook_base: null                # REPLACE: e.g., "./runbooks/"
